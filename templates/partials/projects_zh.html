<section class="project-hero"><div class="container project-hero-inner reveal"><p class="eyebrow">项目经历</p><h1>展示预测分析与业务分析能力的代表项目。</h1><p class="project-summary">每个项目页都包含业务背景、方法、结果以及可交互图表，方便招聘方快速浏览。</p></div></section>
<section class="content-section"><div class="container"><div class="projects-grid">{% for project in data.projects %}<article class="project-card reveal"><div class="project-topline"><span>{{ project.time }}</span><div class="tag-list compact">{% for tag in project.tags %}<span>{{ tag }}</span>{% endfor %}</div></div><h3>{{ project.title }}</h3><p>{{ project.summary }}</p><a class="button button-primary" href="{{ project.url }}">查看项目</a></article>{% endfor %}</div></div></section>
